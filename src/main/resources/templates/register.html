<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>

        body{
        background:#ece5dd;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        font-family:Arial;
        }

        .box{
        background:white;
        padding:30px;
        width:350px;
        border-radius:10px;
        text-align:center;
        }

        input{
        width:90%;
        padding:10px;
        margin:10px;
        }

        button{
        width:95%;
        padding:10px;
        background:#128C7E;
        color:white;
        border:none;
        }

    </style>

</head>

<body>

<div class="box">

    <form action="/register" method="post">

        <h2>Register</h2>

        <input type="text"
               name="username"
               placeholder="Name"
               required>

        <input type="email"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Register
        </button>

    </form>

</div>

</body>
</html>
