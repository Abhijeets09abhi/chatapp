<!DOCTYPE html>
<html>
<head>
    <title>ChatApp Login</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#ece5dd;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            background:white;
            padding:30px;
            width:350px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
            text-align:center;
        }

        h2{
            color:#128C7E;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px;
        }

        button{
            width:95%;
            padding:10px;
            background:#128C7E;
            color:white;
            border:none;
            cursor:pointer;
        }

        a{
            text-decoration:none;
        }
    </style>

</head>
<body>

<div class="login-box">

    <h2>ChatApp Login</h2>

    <form action="/login" method="post">

        <input type="text"
               name="email"
               placeholder="Email"
               required>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <button type="submit">
            Login
        </button>

    </form>

    </form>

    <br>

    <a href="/register">
        New User? Register
    </a>

</div>

</body>
</html>
